name: Build & Release EXE

on:
  push:
    tags:
      - 'v*'          # 推送 v1.0.0 这样的 tag 时自动触发
  workflow_dispatch:  # 也可以在 GitHub 网页手动触发

jobs:
  build-windows:
    name: Build RainExam.exe on Windows
    runs-on: windows-latest
    permissions:
      contents: write   # 允许创建 Release 和上传 Assets

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller openai httpx pywebview

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller RainExam.spec

      - name: Verify EXE exists
        run: |
          if (Test-Path "dist/RainExam.exe") {
            Write-Host "Build succeeded: dist/RainExam.exe"
            Get-Item "dist/RainExam.exe" | Select-Object Name, Length
          } else {
            Write-Error "Build failed: dist/RainExam.exe not found"
            exit 1
          }

      # ── 上传为 Artifact（方便调试下载，不依赖 tag）──
      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: RainExam-windows
          path: dist/RainExam.exe
          retention-days: 30

      # ── 推送 tag 时自动创建 GitHub Release ──
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "RainExam ${{ github.ref_name }}"
          body: |
            ## RainExam ${{ github.ref_name }}

            ---

            ## ⬇️ 下载方式

            > ⚠️ **注意**：页面底部有多个文件，请下载 **`RainExam.exe`**，不要下载 `Source code.zip`（那是源码，不是程序）

            | 文件 | 说明 |
            |------|------|
            | ✅ **`RainExam.exe`** | **点这个下载！** Windows 可执行程序，双击运行 |
            | ❌ `Source code.zip` | 源代码压缩包，普通用户不需要 |
            | ❌ `Source code.tar.gz` | 源代码压缩包，普通用户不需要 |

            ---

            ## 🚀 使用步骤

            1. 下载 **`RainExam.exe`**（约 30~50 MB）
            2. 双击运行，**无需安装 Python 或任何软件**
            3. 在界面中填写 **XT_COOKIE** 和 **试卷 ID**
            4. 点击「保存配置」→「开始运行」

            ## 🍪 如何获取 Cookie

            1. 用浏览器登录 [雨课堂在线](https://examination.xuetangx.com)，进入考试页面
            2. 按 `F12` → `Network` 标签 → 按 `F5` 刷新页面
            3. 点击任意请求 → 找到 `Cookie` 请求头 → 复制完整内容
            4. 粘贴到程序界面的 `XT_COOKIE` 输入框，点「保存配置」

            > ⚠️ 雨课堂每张试卷会生成独立 Token，每次使用需重新获取 Cookie

            ---

            > 详见 [提交记录](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }})
          files: dist/RainExam.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
